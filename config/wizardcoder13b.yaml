# WizardCoder-Python-13B (model_tag: mc)
# Best setting: uniform 4-bit, lr=0.02, 5 epochs (per_epoch eval).
# Best result: MBPP pass@1 = 0.7037 at epoch 1.

model_root: 'your_path'
mc:
  base_model: CodeLlama-13b-Python-hf
  finetuned: WizardCoder-Python-13B-V1.0
  calib_dataset: mbpp
  rank_min: 2
  num_train_samples: 4000
  quant_train_epoch: 5
  train_data_source: magicoder
  learning_rate: 0.02
  weight_decay: 0.0
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  train_batch_size: 1
  grad_accum: 8
  lm_loss_weight: 1.0
  layer_recon_loss_weight: 3000
  logit_distill_weight: 1.0
