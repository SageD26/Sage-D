# config for Magicoder-S-CL-7B (model_tag: mc)
# Mirrors wizardcoder13b.yaml; only base/finetuned model paths differ.

model_root: ./data/models
mc:
  base_model: CodeLlama-7b-Python-hf
  finetuned: Magicoder-S-CL-7B
  calib_dataset: mbpp
  rank_min: 2
  num_train_samples: 4000
  quant_train_epoch: 3
  train_data_source: magicoder
  learning_rate: 0.001
  weight_decay: 0.0
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  train_batch_size: 1
  grad_accum: 8
  lm_loss_weight: 1.0
  layer_recon_loss_weight: 3000
  logit_distill_weight: 1.0
