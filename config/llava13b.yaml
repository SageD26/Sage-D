# LLaVA-V1.5-13B (vicuna-13b-v1.5 base) — TextVQA eval
# Uses model_tag=llava (same code path as 7B); only paths/sizes change.
model_root: ./data/models
llava:
  base_model: vicuna-13b-v1.5
  finetuned: llava-lm-only-13b
  calib_dataset: alpaca
  rank_min: 1
  num_train_samples: 5000
  quant_train_epoch: 7
  train_data_source: alpaca

  learning_rate: 1.0e-3
  weight_decay: 0.0
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  train_batch_size: 1
  grad_accum: 6

  lm_loss_weight: 0.1
  layer_recon_loss_weight: 3000
  logit_distill_weight: 1.0

  # TextVQA only (skip GQA)
  llava_tasks: ["textvqa"]
